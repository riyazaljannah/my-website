<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>سامانه مدرسه</title>

<style>

body{
    margin:0;
    font-family:tahoma;
    background:#f2f2f2;
    text-align:center;
}

header{
    background:#0077ff;
    color:white;
    padding:30px;
}

.container{
    background:white;
    padding:30px;
    margin:40px auto;
    width:80%;
    max-width:400px;
    border-radius:15px;
}

button{
    background:#0077ff;
    color:white;
    border:none;
    padding:12px 25px;
    margin:10px;
    border-radius:8px;
    font-size:17px;
    cursor:pointer;
}

button:hover{
    background:#005fd1;
}

input{
    width:80%;
    padding:12px;
    border-radius:8px;
    border:1px solid #ccc;
}

.back{
    background:#777;
}

</style>

</head>


<body>


<header>

<h1>سامانه مدرسه</h1>

</header>


<div class="container" id="box">


<h2>ورود به سامانه</h2>

<p>نوع ورود را انتخاب کنید</p>


<button onclick="studentLogin()">
ورود دانش‌آموز
</button>


<button onclick="teacherLogin()">
ورود استاد
</button>


</div>



<script>


function teacherLogin(){

document.getElementById("box").innerHTML=`

<h2>ورود استاد</h2>

<input placeholder="شماره تلفن"><br><br>

<input placeholder="کد ملی"><br><br>

<input type="password" placeholder="رمز عبور"><br><br>


<button onclick="teacherEnter()">
ورود
</button>


<br>

<button class="back" onclick="back()">
بازگشت
</button>

`;

}



function studentLogin(){

document.getElementById("box").innerHTML=`

<h2>ورود دانش‌آموز</h2>

<input placeholder="کد ملی"><br><br>

<input type="password" placeholder="رمز عبور"><br><br>


<button>
ورود
</button>


<br>

<button class="back" onclick="back()">
بازگشت
</button>

`;

}




function teacherEnter(){


document.getElementById("box").innerHTML=`

<h2>پنل استاد 👨‍🏫</h2>


<button onclick="addStudent()">
➕ ثبت دانش‌آموز
</button>


<br>


<button onclick="addGrade()">
📝 ثبت نمره
</button>


<br>


<button onclick="showReports()">
📄 مشاهده کارنامه‌ها
</button>


<br>


<button class="back" onclick="back()">
خروج
</button>


`;

}




function addStudent(){


document.getElementById("box").innerHTML=`

<h2>ثبت دانش‌آموز</h2>


<input placeholder="نام دانش‌آموز"><br><br>

<input placeholder="کد ملی"><br><br>

<input placeholder="کلاس"><br><br>

<input placeholder="رمز ورود"><br><br>


<button onclick="alert('دانش‌آموز ثبت شد ✅')">
ذخیره
</button>


<br>


<button class="back" onclick="teacherEnter()">
بازگشت
</button>

`;

}





function addGrade(){

document.getElementById("box").innerHTML=`

<h2>انتخاب کلاس</h2>


<button onclick="chooseClass('نورانی')">
کلاس نورانی
</button>

<br>


<button onclick="chooseClass('روخوانی')">
کلاس روخوانی
</button>

<br>


<button onclick="chooseClass('حفظ')">
کلاس حفظ
</button>


<br>


<button class="back" onclick="teacherEnter()">
بازگشت
</button>

`;

}



function chooseClass(className){


if(className=="نورانی"){

document.getElementById("box").innerHTML=`

<h2>دانش‌آموزان کلاس ${className}</h2>


<button>
احمد محمدی
</button>

<br>

<button>
علی احمدی
</button>

<br>

<button>
محمد حسینی
</button>


<br>

<button class="back" onclick="addGrade()">
بازگشت
</button>

`;

}

else{


document.getElementById("box").innerHTML=`

<h2>دانش‌آموزان کلاس ${className}</h2>


<button onclick="studentGrade('احمد محمدی','${className}')">
احمد محمدی
</button>

<br>


<button onclick="studentGrade('علی احمدی','${className}')">
علی احمدی
</button>

<br>


<button onclick="studentGrade('محمد حسینی','${className}')">
محمد حسینی
</button>


<br>


<button class="back" onclick="addGrade()">
بازگشت
</button>

`;

}


}




function studentGrade(name,className){

let parts="";


for(let i=1;i<=30;i++){


parts += `

<p>
جزء ${i}

<input 
style="width:80px"
placeholder="نمره">

</p>


`;

}



document.getElementById("box").innerHTML=`

<h2>
ثبت نمره ${className}
</h2>

<h3>
دانش‌آموز: ${name}
</h3>


${parts}


<button onclick="alert('نمرات ذخیره شد ✅')">
ذخیره نمرات
</button>


<br>


<button class="back" onclick="chooseClass('${className}')">
بازگشت
</button>


`;

}



function studentGrade(name){

let parts="";

for(let i=1;i<=30;i++){

parts += `

<p>
جزء ${i}

<input 
style="width:80px"
placeholder="نمره">

</p>

`;

}


document.getElementById("box").innerHTML=`

<h2>ثبت نمره برای ${name}</h2>

${parts}


<button onclick="alert('نمرات ذخیره شد ✅')">
ذخیره نمرات
</button>


<br>


<button class="back" onclick="teacherEnter()">
بازگشت
</button>

`;

}





function showReports(){


document.getElementById("box").innerHTML=`

<h2>کارنامه‌ها</h2>


<p>
لیست کارنامه‌ها بعد از اتصال دیتابیس نمایش داده می‌شود.
</p>


<button class="back" onclick="teacherEnter()">
بازگشت
</button>


`;

}




function back(){

location.reload();

}


</script>


</body>

</html>
