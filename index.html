<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>سامانه مدرسه</title>

<style>

body{
    margin:0;
    font-family:tahoma, sans-serif;
    background:#f2f2f2;
    text-align:center;
}

header{
    background:#0077ff;
    color:white;
    padding:30px;
}

main{
    padding:40px;
}

.container{
    background:white;
    padding:30px;
    margin:30px auto;
    width:80%;
    max-width:400px;
    border-radius:15px;
}

button{
    background:#0077ff;
    color:white;
    border:none;
    padding:12px 25px;
    font-size:18px;
    border-radius:8px;
    cursor:pointer;
    margin:10px;
}

button:hover{
    background:#005fd1;
}

input{
    width:80%;
    padding:12px;
    font-size:16px;
    border-radius:8px;
    border:1px solid #ccc;
}

.back{
    background:#777;
}

</style>

</head>

<body>

<header>
<h1>سامانه مدرسه</h1>
</header>


<main>

<div class="container" id="box">

<h2>ورود به سامانه</h2>

<p>نوع ورود خود را انتخاب کنید:</p>


<button onclick="studentLogin()">
ورود دانش‌آموز
</button>


<button onclick="teacherLogin()">
ورود استاد
</button>

</div>

</main>


<script>

function studentLogin(){

document.getElementById("box").innerHTML = `

<h2>ورود دانش‌آموز</h2>

<input type="text" placeholder="کد ملی"><br><br>

<input type="password" placeholder="رمز عبور"><br><br>

<button onclick="studentEnter()">
ورود
</button>

<br>

<button class="back" onclick="back()">
بازگشت
</button>

`;

}


function teacherLogin(){

document.getElementById("box").innerHTML = `

<h2>ورود استاد</h2>

<input type="text" placeholder="شماره تلفن"><br><br>

<input type="text" placeholder="کد ملی"><br><br>

<input type="password" placeholder="رمز عبور"><br><br>

<button onclick="teacherEnter()">
ورود
</button>

<br>

<button class="back" onclick="back()">
بازگشت
</button>

`;

}


function teacherEnter(){

alert("ورود استاد - مرحله بعد پنل استاد ساخته می‌شود");

}


function studentEnter(){

alert("ورود دانش‌آموز - مرحله بعد کارنامه ساخته می‌شود");

}


function back(){

location.reload();

}

</script>


</body>
</html>
