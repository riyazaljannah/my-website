<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>سامانه مدرسه</title>

<style>

body{
    margin:0;
    font-family:tahoma;
    background:#f2f2f2;
    text-align:center;
}

header{
    background:#0077ff;
    color:white;
    padding:30px;
}

.container{
    background:white;
    padding:30px;
    margin:40px auto;
    width:80%;
    max-width:400px;
    border-radius:15px;
}

button{
    background:#0077ff;
    color:white;
    border:none;
    padding:12px 25px;
    margin:10px;
    border-radius:8px;
    font-size:17px;
    cursor:pointer;
}

button:hover{
    background:#005fd1;
}

input{
    width:80%;
    padding:12px;
    border-radius:8px;
    border:1px solid #ccc;
}

.back{
    background:#777;
}

</style>

</head>


<body>


<header>

<h1>سامانه مدرسه</h1>

</header>


<div class="container" id="box">


<h2>ورود به سامانه</h2>

<p>نوع ورود را انتخاب کنید</p>


<button onclick="studentLogin()">
ورود دانش‌آموز
</button>


<button onclick="teacherLogin()">
ورود استاد
</button>


</div>



<script>


function teacherLogin(){

document.getElementById("box").innerHTML=`

<h2>ورود استاد</h2>

<input placeholder="شماره تلفن"><br><br>

<input placeholder="کد ملی"><br><br>

<input type="password" placeholder="رمز عبور"><br><br>


<button onclick="teacherEnter()">
ورود
</button>


<br>

<button class="back" onclick="back()">
بازگشت
</button>

`;

}



function studentLogin(){

document.getElementById("box").innerHTML=`

<h2>ورود دانش‌آموز</h2>

<input placeholder="کد ملی"><br><br>

<input type="password" placeholder="رمز عبور"><br><br>


<button>
ورود
</button>


<br>

<button class="back" onclick="back()">
بازگشت
</button>

`;

}




function teacherEnter(){


document.getElementById("box").innerHTML=`

<h2>پنل استاد 👨‍🏫</h2>


<button onclick="addStudent()">
➕ ثبت دانش‌آموز
</button>


<br>


<button onclick="addGrade()">
📝 ثبت نمره
</button>


<br>


<button onclick="showReports()">
📄 مشاهده کارنامه‌ها
</button>


<br>


<button class="back" onclick="back()">
خروج
</button>


`;

}




function addStudent(){


document.getElementById("box").innerHTML=`

<h2>ثبت دانش‌آموز</h2>


<input placeholder="نام دانش‌آموز"><br><br>

<input placeholder="کد ملی"><br><br>

<input placeholder="کلاس"><br><br>

<input placeholder="رمز ورود"><br><br>


<button onclick="alert('دانش‌آموز ثبت شد ✅')">
ذخیره
</button>


<br>


<button class="back" onclick="teacherEnter()">
بازگشت
</button>

`;

}





function addGrade(){


document.getElementById("box").innerHTML=`

<h2>ثبت نمره</h2>


<input placeholder="کد ملی دانش‌آموز"><br><br>

<input placeholder="نام درس"><br><br>

<input placeholder="نمره"><br><br>


<button onclick="alert('نمره ثبت شد ✅')">
ثبت
</button>


<br>


<button class="back" onclick="teacherEnter()">
بازگشت
</button>


`;

}





function showReports(){


document.getElementById("box").innerHTML=`

<h2>کارنامه‌ها</h2>


<p>
لیست کارنامه‌ها بعد از اتصال دیتابیس نمایش داده می‌شود.
</p>


<button class="back" onclick="teacherEnter()">
بازگشت
</button>


`;

}




function back(){

location.reload();

}


</script>


</body>

</html>
